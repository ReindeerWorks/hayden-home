<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#8b5cf6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hayden">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>Hayden's Home</title>
<style>
  /* ============================================================
     Hayden's Home — a kid-friendly launcher
     Vanilla HTML/CSS/JS. No frameworks, no build, no deps.
     Touch-first (big tap targets) AND fully keyboard-usable.
  ============================================================ */

  :root {
    --purple:      #8b5cf6;
    --purple-deep: #6d28d9;
    --pink:        #f472b6;
    --teal:        #2dd4bf;
    --yellow:      #fbbf24;
    --sky:         #38bdf8;
    --bg-1:        #f5edff;
    --bg-2:        #ffeef8;
    --ink:         #3b2a5a;
    --tile-radius: 28px;
    --focus:       #ff7a00;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Trebuchet MS", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
    min-height: 100%;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* Big, obvious focus ring everywhere for keyboard users */
  :focus-visible {
    outline: 6px solid var(--focus);
    outline-offset: 4px;
    border-radius: 10px;
  }

  /* ---------- View switching ---------- */
  .view { display: none; }
  body[data-view="home"]    #home    { display: block; }
  body[data-view="typing"]  #typing  { display: flex; }
  body[data-view="drawing"] #drawing { display: flex; }
  body[data-view="gallery"] #gallery { display: flex; }
  body[data-view="animals"] #animals { display: flex; }
  body[data-view="card"]    #animal-card { display: flex; }

  /* ============================================================
     HOME VIEW
  ============================================================ */
  #home {
    max-width: 1100px;
    margin: 0 auto;
    padding: clamp(16px, 4vw, 40px) clamp(14px, 4vw, 32px) 60px;
  }

  .home-header {
    text-align: center;
    margin: 8px 0 24px;
  }
  .home-header h1 {
    font-size: clamp(34px, 8vw, 64px);
    margin: 0;
    color: var(--purple-deep);
    text-shadow: 2px 3px 0 #fff, 4px 6px 0 rgba(139,92,246,.18);
    letter-spacing: 1px;
  }
  .home-header p {
    font-size: clamp(18px, 4vw, 26px);
    margin: 6px 0 0;
    color: var(--pink);
  }

  .section-title {
    font-size: clamp(22px, 5vw, 34px);
    color: var(--purple-deep);
    margin: 28px 6px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
    gap: clamp(16px, 3vw, 28px);
  }

  /* A tile is a link or button. Reset native styles. */
  .tile {
    appearance: none;
    border: none;
    text-decoration: none;
    color: inherit;
    font: inherit;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: var(--tile-radius);
    overflow: hidden;
    box-shadow: 0 10px 0 rgba(139,92,246,.18), 0 14px 30px rgba(109,40,217,.18);
    transition: transform .12s ease, box-shadow .12s ease;
    text-align: left;
    padding: 0;
  }
  .tile:hover,
  .tile:focus-visible {
    transform: translateY(-6px);
    box-shadow: 0 16px 0 rgba(139,92,246,.22), 0 22px 40px rgba(109,40,217,.24);
  }
  .tile:active { transform: translateY(0); }

  /* Image area of a tile — uniform shape, screenshots cover it */
  .tile-art {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .tile-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;     /* differing screenshot shapes fill uniformly */
    display: block;
  }
  .tile-emoji {
    font-size: clamp(64px, 16vw, 110px);
    line-height: 1;
    filter: drop-shadow(0 6px 6px rgba(0,0,0,.18));
  }

  /* Distinct gradients for the non-screenshot tiles */
  .art-typing { background: linear-gradient(135deg, var(--teal) 0%, var(--sky) 100%); }
  .art-family { background: linear-gradient(135deg, var(--yellow) 0%, var(--pink) 100%); }
  .art-animals{ background: linear-gradient(135deg, #34d399 0%, var(--teal) 100%); }
  .art-drawing{ background: linear-gradient(135deg, var(--pink) 0%, var(--yellow) 50%, var(--sky) 100%); }
  .art-gallery{ background: linear-gradient(135deg, #a78bfa 0%, var(--pink) 100%); }
  .art-animalfriends{ background: linear-gradient(135deg, var(--yellow) 0%, var(--pink) 50%, #34d399 100%); }
  .art-phonics{ background: linear-gradient(135deg, var(--sky) 0%, var(--purple) 100%); }

  .tile-label {
    padding: 16px 18px;
    font-size: clamp(19px, 3.4vw, 25px);
    font-weight: bold;
    color: var(--purple-deep);
    min-height: 64px;
    display: flex;
    align-items: center;
  }

  /* "Coming soon" photo tile — not tappable */
  .tile.coming-soon {
    cursor: default;
    opacity: .85;
    box-shadow: 0 8px 0 rgba(139,92,246,.10), 0 10px 24px rgba(109,40,217,.10);
  }
  .tile.coming-soon:hover { transform: none; }
  .tile.coming-soon .tile-art { background: linear-gradient(135deg, #c4b5fd 0%, #ddd6fe 100%); }
  .tile.coming-soon .tile-label { color: #8b7bb5; flex-direction: column; align-items: flex-start; gap: 2px; }
  .coming-pill {
    font-size: clamp(14px, 3vw, 18px);
    font-weight: bold;
    color: #fff;
    background: var(--purple);
    padding: 4px 14px;
    border-radius: 999px;
  }

  /* ============================================================
     TYPING VIEW
  ============================================================ */
  #typing {
    position: fixed;
    inset: 0;
    flex-direction: column;
    background: linear-gradient(160deg, #ede9fe 0%, #fce7f3 100%);
  }

  .typing-bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px clamp(12px, 3vw, 24px);
    background: rgba(255,255,255,.6);
    backdrop-filter: blur(4px);
  }

  .big-btn {
    appearance: none;
    border: none;
    font: inherit;
    font-weight: bold;
    cursor: pointer;
    border-radius: 999px;
    padding: 16px clamp(18px, 4vw, 30px);
    font-size: clamp(20px, 4.5vw, 28px);
    color: #fff;
    box-shadow: 0 6px 0 rgba(0,0,0,.15);
    transition: transform .08s ease;
    min-height: 64px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .big-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,.15); }
  .btn-home  { background: var(--purple); }
  .btn-clear { background: var(--pink); }
  .btn-sound { background: var(--teal); margin-left: auto; }
  .btn-save  { background: #22c55e; }
  .btn-undo  { background: var(--sky); }
  .btn-gallery { background: #a78bfa; }

  /* Stage where the giant letters appear */
  .stage {
    position: relative;
    flex: 1 1 auto;
    overflow: hidden;
    display: flex;
    align-content: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px 14px;
    padding: 20px;
  }
  /* Transparent full-stage input summons the on-screen keyboard on tablets */
  #capture {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    border: 0;
    background: transparent;
    font-size: 16px;          /* >=16px avoids mobile auto-zoom */
    caret-color: transparent;
    color: transparent;
    z-index: 1;
  }
  .letters {
    position: relative;
    z-index: 0;
    display: flex;
    flex-wrap: wrap;
    align-content: center;
    justify-content: center;
    gap: 4px 8px;
    width: 100%;
    pointer-events: none;
  }
  .letter {
    font-size: clamp(44px, 9vw, 110px);
    font-weight: bold;
    line-height: 1;
    animation: pop-in .35s cubic-bezier(.18,1.4,.4,1);
  }
  .letter.space { width: clamp(22px, 4.5vw, 50px); }
  @keyframes pop-in {
    0%   { transform: scale(.1) rotate(-12deg); opacity: 0; }
    60%  { transform: scale(1.25) rotate(6deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .hint {
    position: absolute;
    bottom: 14px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: clamp(16px, 3.5vw, 22px);
    color: #9b8bc4;
    pointer-events: none;
    z-index: 0;
  }
  .stage:not(.empty) .hint { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .letter { animation: none; }
    .tile { transition: none; }
  }

  /* ============================================================
     DRAWING VIEW
  ============================================================ */
  #drawing {
    position: fixed;
    inset: 0;
    flex-direction: column;
    background: linear-gradient(160deg, #ede9fe 0%, #fce7f3 100%);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;          /* no page scroll / pinch / pull-to-refresh here */
  }

  /* Second toolbar row: color swatches + brush sizes */
  .tools-bar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px clamp(12px, 4vw, 28px);
    padding: 8px clamp(12px, 3vw, 24px);
    background: rgba(255,255,255,.45);
  }
  .draw-bar { flex-wrap: wrap; }   /* Home/Clear/Save wrap rather than overflow */

  /* 14 colours laid out as two rows of 7 so each stays big */
  .swatches {
    display: grid;
    grid-template-columns: repeat(7, auto);
    justify-content: start;
    align-items: center;
    gap: 8px;
  }
  .swatch {
    appearance: none;
    padding: 0;
    width: clamp(42px, 8vw, 58px);
    height: clamp(42px, 8vw, 58px);
    border-radius: 50%;
    border: 4px solid #fff;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,.15);
    transition: transform .08s ease;
  }
  .swatch:active { transform: translateY(2px); }
  .swatch.is-white { border-color: #94a3b8; }   /* visible outline on the white canvas */
  .swatch[aria-pressed="true"] {
    outline: 5px solid var(--purple-deep);
    outline-offset: 3px;
    transform: scale(1.14);
  }

  .sizes { display: flex; align-items: center; gap: 8px; }
  .size-btn {
    appearance: none;
    border: none;
    cursor: pointer;
    background: #fff;
    border-radius: 999px;
    min-width: clamp(54px, 11vw, 70px);
    height: clamp(48px, 9vw, 62px);
    padding: 0 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 0 rgba(0,0,0,.15);
  }
  .size-btn:active { transform: translateY(2px); }
  .size-btn[aria-pressed="true"] { outline: 5px solid var(--purple-deep); outline-offset: 3px; }
  .size-dot { display: block; background: var(--ink); border-radius: 50%; }
  .eraser-btn { font-size: clamp(22px, 5vw, 28px); }   /* same pill look as size buttons */

  .draw-stage {
    position: relative;
    flex: 1 1 auto;
    overflow: hidden;
    touch-action: none;
    padding: 10px clamp(10px, 3vw, 20px) clamp(12px, 3vw, 20px);
  }
  #pad {
    display: block;
    width: 100%;
    height: 100%;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(109,40,217,.20);
    touch-action: none;
    cursor: crosshair;
  }

  /* ============================================================
     GALLERY VIEW (saved drawings)
  ============================================================ */
  #gallery {
    position: fixed;
    inset: 0;
    flex-direction: column;
    background: linear-gradient(160deg, #ede9fe 0%, #fce7f3 100%);
  }
  .gallery-title {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: bold;
    color: var(--purple-deep);
    margin-left: 6px;
  }
  .gallery-scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: clamp(12px, 3vw, 24px);
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 200px), 1fr));
    gap: clamp(12px, 3vw, 20px);
  }
  .art-tile {
    appearance: none;
    border: none;
    padding: 0;
    cursor: pointer;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    box-shadow: 0 8px 0 rgba(139,92,246,.15), 0 12px 24px rgba(109,40,217,.16);
    transition: transform .1s ease;
  }
  .art-tile:hover, .art-tile:focus-visible { transform: translateY(-4px); }
  .art-tile:active { transform: translateY(0); }
  .art-tile img { width: 100%; height: 100%; object-fit: contain; background: #fff; display: block; }

  .gallery-empty {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    color: var(--purple-deep);
    padding: 30px;
  }
  .gallery-empty[hidden] { display: none; }   /* override .gallery-empty's display:flex */
  .gallery-empty .big-emoji { font-size: clamp(60px, 18vw, 120px); line-height: 1; }
  .gallery-empty p { font-size: clamp(20px, 5vw, 30px); margin: 0; }

  /* Full-screen single-drawing viewer (overlay inside the gallery) */
  .art-viewer {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: none;
    flex-direction: column;
    background: rgba(45, 27, 61, .94);
  }
  #gallery.viewing .art-viewer { display: flex; }
  .art-viewer-bar {
    flex: 0 0 auto;
    display: flex;
    gap: 12px;
    padding: 14px clamp(12px, 3vw, 24px);
  }
  .art-viewer-img {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px clamp(12px, 3vw, 24px) clamp(16px, 4vw, 30px);
    overflow: hidden;
  }
  .art-viewer-img img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 12px 36px rgba(0,0,0,.45);
  }

  /* ============================================================
     ANIMAL FRIENDS (grid + card)
  ============================================================ */
  #animals, #animal-card {
    position: fixed;
    inset: 0;
    flex-direction: column;
    background: linear-gradient(160deg, #ede9fe 0%, #fce7f3 100%);
  }
  .animals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 220px), 1fr));
    gap: clamp(12px, 3vw, 22px);
  }
  .animal-tile {
    appearance: none;
    border: none;
    padding: 0;
    cursor: pointer;
    background: #fff;
    border-radius: 22px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 0 rgba(139,92,246,.15), 0 12px 24px rgba(109,40,217,.16);
    transition: transform .1s ease;
  }
  .animal-tile:hover, .animal-tile:focus-visible { transform: translateY(-5px); }
  .animal-tile:active { transform: translateY(0); }
  .animal-tile-art { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background: #eee; }
  .animal-tile-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .animal-tile-label {
    padding: 12px;
    font-size: clamp(22px, 4vw, 30px);
    font-weight: bold;
    color: var(--purple-deep);
    text-align: center;
  }

  /* Animal card */
  .animal-card-bar { flex-wrap: wrap; }
  .btn-prev, .btn-next { background: var(--purple); font-size: clamp(24px, 6vw, 34px); }
  .btn-read { background: #22c55e; margin-left: auto; }
  .animal-card-body {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(14px, 3vw, 24px);
    padding: clamp(14px, 3vw, 30px);
    text-align: center;
  }
  .animal-card-img {
    max-width: 100%;
    max-height: 46vh;
    object-fit: contain;
    border-radius: 22px;
    background: #fff;
    box-shadow: 0 10px 28px rgba(109,40,217,.22);
  }
  .animal-card-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 2.5vw, 18px);
    max-width: min(94vw, 760px);
  }
  .ac-name { font-size: clamp(40px, 9vw, 70px); font-weight: bold; color: var(--purple-deep); }
  .ac-fact, .ac-sound { font-size: clamp(24px, 5vw, 36px); color: var(--ink); margin: 0; line-height: 1.45; }
  .aw { padding: 1px 5px; border-radius: 9px; transition: background .06s ease; }
  .aw.speaking { background: var(--yellow); color: var(--ink); }
</style>
</head>
<body data-view="home">

  <!-- ================= HOME ================= -->
  <main id="home" class="view">
    <header class="home-header">
      <h1>Hi Hayden! 💜</h1>
      <p>Pick something fun to do</p>
    </header>

    <h2 class="section-title">🎮 Games</h2>
    <div class="grid">
      <a class="tile" href="https://reindeerworks.github.io/hayden-math-quest/">
        <div class="tile-art"><img src="images/math-quest.png" alt="Hayden's K-Pop Math Quest"></div>
        <div class="tile-label">Hayden's K-Pop Math Quest</div>
      </a>

      <a class="tile" href="https://reindeerworks.github.io/hayden-memory-match/">
        <div class="tile-art"><img src="images/memory-match.png" alt="Hayden's Memory Match"></div>
        <div class="tile-label">Hayden's Memory Match</div>
      </a>

      <a class="tile" href="https://reindeerworks.github.io/gabbymemory/gabbyandhaydengame.html">
        <div class="tile-art"><img src="images/gabby-memory.png" alt="Gabby's Memory Game"></div>
        <div class="tile-label">Gabby's Memory Game</div>
      </a>

      <a class="tile" href="https://reindeerworks.github.io/spell-the-summon/">
        <div class="tile-art"><img src="images/spell-the-summon.png" alt="Spell the Summon"></div>
        <div class="tile-label">Spell the Summon</div>
      </a>

      <a class="tile" href="https://reindeerworks.github.io/hayden-sound-it-out/">
        <div class="tile-art art-phonics"><span class="tile-emoji" aria-hidden="true">🔤</span></div>
        <div class="tile-label">Sound It Out</div>
      </a>

      <button class="tile" type="button" id="open-typing">
        <div class="tile-art art-typing"><span class="tile-emoji" aria-hidden="true">⌨️</span></div>
        <div class="tile-label">Typing Box</div>
      </button>

      <button class="tile" type="button" id="open-drawing">
        <div class="tile-art art-drawing"><span class="tile-emoji" aria-hidden="true">🎨</span></div>
        <div class="tile-label">Drawing Pad</div>
      </button>

      <button class="tile" type="button" id="open-gallery">
        <div class="tile-art art-gallery"><span class="tile-emoji" aria-hidden="true">🖼️</span></div>
        <div class="tile-label">My Art</div>
      </button>

      <button class="tile" type="button" id="open-animals">
        <div class="tile-art art-animalfriends"><span class="tile-emoji" aria-hidden="true">🦁</span></div>
        <div class="tile-label">Learn about Animals</div>
      </button>
    </div>

    <h2 class="section-title">📸 Photos</h2>
    <div class="grid" id="photos-grid">
      <!-- Photo tiles are rendered by JS based on the album URLs below -->
    </div>
  </main>

  <!-- ================= TYPING ================= -->
  <section id="typing" class="view" aria-label="Typing Box">
    <div class="typing-bar">
      <button class="big-btn btn-home" type="button" id="typing-home">🏠 Home</button>
      <button class="big-btn btn-clear" type="button" id="typing-clear">🧹 Clear</button>
      <button class="big-btn btn-sound" type="button" id="typing-sound" aria-pressed="true">🔊 Sound on</button>
    </div>
    <div class="stage empty" id="stage">
      <input id="capture" type="text"
             autocomplete="off" autocorrect="off" autocapitalize="characters"
             spellcheck="false" inputmode="text" aria-label="Type letters here">
      <div class="letters" id="letters" aria-live="polite"></div>
      <div class="hint">Press any key! ✨</div>
    </div>
  </section>

  <!-- ================= DRAWING ================= -->
  <section id="drawing" class="view" aria-label="Drawing Pad">
    <div class="typing-bar draw-bar">
      <button class="big-btn btn-home"  type="button" id="draw-home">🏠 Home</button>
      <button class="big-btn btn-undo"  type="button" id="draw-undo">↩️ Undo</button>
      <button class="big-btn btn-clear" type="button" id="draw-clear">🧹 Clear</button>
      <button class="big-btn btn-save"  type="button" id="draw-save">💾 Save</button>
      <button class="big-btn btn-gallery" type="button" id="draw-gallery">🖼️ Art</button>
    </div>
    <div class="tools-bar">
      <div class="swatches" id="swatches" role="group" aria-label="Colors"></div>
      <div class="sizes" id="sizes" role="group" aria-label="Brush size"></div>
      <button class="size-btn eraser-btn" type="button" id="draw-eraser" aria-pressed="false" aria-label="Eraser">🧽</button>
    </div>
    <div class="draw-stage" id="draw-stage">
      <canvas id="pad" aria-label="Drawing canvas"></canvas>
    </div>
  </section>

  <!-- ================= GALLERY ================= -->
  <section id="gallery" class="view" aria-label="My Art gallery">
    <div class="typing-bar">
      <button class="big-btn btn-home" type="button" id="gallery-home">🏠 Home</button>
      <span class="gallery-title">🖼️ My Art</span>
    </div>
    <div class="gallery-scroll" id="gallery-scroll">
      <div class="gallery-grid" id="gallery-grid"></div>
      <div class="gallery-empty" id="gallery-empty" hidden>
        <div class="big-emoji" aria-hidden="true">🎨</div>
        <p>No drawings yet!<br>Tap Drawing Pad to make one.</p>
        <button class="big-btn btn-home" type="button" id="gallery-empty-draw">🎨 Go Draw</button>
      </div>
    </div>
    <div class="art-viewer" id="art-viewer">
      <div class="art-viewer-bar">
        <button class="big-btn btn-home" type="button" id="viewer-back">⬅️ Back</button>
        <button class="big-btn btn-save" type="button" id="viewer-home">🏠 Home</button>
      </div>
      <div class="art-viewer-img"><img id="art-viewer-img" alt="Drawing"></div>
    </div>
  </section>

  <!-- ================= ANIMAL FRIENDS — GRID ================= -->
  <section id="animals" class="view" aria-label="Learn about Animals">
    <div class="typing-bar">
      <button class="big-btn btn-home" type="button" id="animals-home">🏠 Home</button>
      <span class="gallery-title">🦁 Learn about Animals</span>
    </div>
    <div class="gallery-scroll">
      <div class="animals-grid" id="animals-grid"></div>
    </div>
  </section>

  <!-- ================= ANIMAL FRIENDS — CARD ================= -->
  <section id="animal-card" class="view" aria-label="Animal card">
    <div class="typing-bar animal-card-bar">
      <button class="big-btn btn-home" type="button" id="card-home">🏠 Home</button>
      <button class="big-btn btn-prev" type="button" id="card-prev" aria-label="Previous animal">←</button>
      <button class="big-btn btn-next" type="button" id="card-next" aria-label="Next animal">→</button>
      <button class="big-btn btn-read" type="button" id="card-read">🔊 Read again</button>
    </div>
    <div class="animal-card-body" id="animal-card-body">
      <img class="animal-card-img" id="animal-card-img" alt="">
      <div class="animal-card-text" id="animal-card-text">
        <div class="ac-name" id="ac-name"></div>
        <p class="ac-fact" id="ac-fact"></p>
        <p class="ac-sound" id="ac-sound"></p>
      </div>
    </div>
  </section>

<script>
  /* ============================================================
     CONFIG — set these when the photo albums are ready.
     Empty string = tile shows "Coming soon" and is NOT tappable.
     A URL      = tile opens that link in a NEW tab.
  ============================================================ */
  const FAMILY_ALBUM_URL  = "https://photos.app.goo.gl/zJUL2hJeXW8rws6U9";
  const ANIMALS_ALBUM_URL = "https://photos.app.goo.gl/oYSywhirrwUxMJ4H8";

  /* ============================================================
     ANIMAL FRIENDS DATA
     To add an animal: drop a photo in animals/ and add one entry
     with { name, img, fact, sound }. Order here is the card order.
  ============================================================ */
  const ANIMALS = [
    { name: "Cat",      img: "cat.jpg",      facts: ["Cats eat meat and special cat food.", "Soft paws hide sharp claws for climbing.", "Cats love to nap in the sun."],                sound: "A cat says: meow." },
    { name: "Dog",      img: "dog.jpg",      facts: ["Dogs eat meat and crunchy dog food.", "A dog's nose can smell far better than ours.", "Dogs love to run and wag their tails."], sound: "A dog says: woof." },
    { name: "Rabbit",   img: "rabbit.jpg",   facts: ["Rabbits eat grass, hay, and carrots.", "Long ears help a rabbit hear everything.", "Rabbits hop fast on big back feet."],        sound: "A rabbit thumps its feet: thump, thump!" },
    { name: "Panda",    img: "panda.jpg",    facts: ["Pandas eat lots and lots of bamboo.", "A panda is a kind of bear.", "Pandas live far away in China."],                          sound: "A panda makes a soft bleat." },
    { name: "Koala",    img: "koala.jpg",    facts: ["Koalas eat leaves from gum trees.", "Koalas sleep almost all day long.", "They live up high in the trees."],                     sound: "A koala makes a deep grunt." },
    { name: "Penguin",  img: "penguin.jpg",  facts: ["Penguins eat fish from the sea.", "Penguins can't fly, but they swim fast.", "Many penguins live where it's cold and snowy."],    sound: "A penguin makes a honk." },
    { name: "Elephant", img: "elephant.jpg", facts: ["Elephants eat grass, leaves, and fruit.", "An elephant uses its trunk like a hand.", "Elephants are the biggest animals on land."], sound: "An elephant trumpets with its trunk." },
    { name: "Lion",     img: "lion.jpg",     facts: ["Lions eat meat that they hunt.", "A lion has a big, loud roar.", "Lions live on warm, grassy land in Africa."],                  sound: "A lion says: roar!" },
    { name: "Fox",      img: "fox.jpg",      facts: ["Foxes eat small animals and berries.", "A fox has a big, bushy tail.", "Foxes are clever and live in the forest."],              sound: "A fox says: yip!" },
    { name: "Owl",      img: "owl.jpg",      facts: ["Owls eat mice and bugs.", "Owls stay awake at night.", "An owl can turn its head way around."],                                 sound: "An owl says: hoot, hoot." },
    { name: "Dolphin",  img: "dolphin.jpg",  facts: ["Dolphins eat lots of fish.", "Dolphins live and swim in the ocean.", "Dolphins are very smart and playful."],                   sound: "A dolphin makes clicks and whistles." },
    { name: "Giraffe",  img: "giraffe.jpg",  facts: ["Giraffes eat leaves from tall trees.", "A giraffe is the tallest animal of all.", "Its long neck reaches the highest leaves."], sound: "A giraffe hums very softly." }
  ];

  /* ---------- View navigation ---------- */
  const body = document.body;
  function goHome()   { body.dataset.view = "home"; stopSpeaking(); }
  function goTyping() {
    body.dataset.view = "typing";
    // Focus the capture input so a tablet's on-screen keyboard appears.
    setTimeout(function () { capture.focus(); }, 50);
  }

  /* ---------- Build the two photo tiles ---------- */
  function makePhotoTile(label, emoji, artClass, url) {
    if (url) {
      const a = document.createElement("a");
      a.className = "tile";
      a.href = url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.innerHTML =
        '<div class="tile-art ' + artClass + '"><span class="tile-emoji" aria-hidden="true">' + emoji + '</span></div>' +
        '<div class="tile-label">' + label + '</div>';
      return a;
    }
    // Coming-soon: a non-interactive div (not focusable, not tappable)
    const div = document.createElement("div");
    div.className = "tile coming-soon";
    div.setAttribute("aria-label", label + " — coming soon");
    div.innerHTML =
      '<div class="tile-art ' + artClass + '"><span class="tile-emoji" aria-hidden="true">' + emoji + '</span></div>' +
      '<div class="tile-label">' + label + '<span class="coming-pill">Coming soon</span></div>';
    return div;
  }
  (function renderPhotos() {
    const grid = document.getElementById("photos-grid");
    grid.appendChild(makePhotoTile("Family",  "👨‍👩‍👧", "art-family",  FAMILY_ALBUM_URL));
    grid.appendChild(makePhotoTile("Animals", "🐶",     "art-animals", ANIMALS_ALBUM_URL));
  })();

  document.getElementById("open-typing").addEventListener("click", goTyping);
  document.getElementById("typing-home").addEventListener("click", goHome);

  /* ============================================================
     TYPING BOX
  ============================================================ */
  const capture   = document.getElementById("capture");
  const lettersEl = document.getElementById("letters");
  const stageEl   = document.getElementById("stage");
  const soundBtn  = document.getElementById("typing-sound");

  const COLORS = ["#8b5cf6","#f472b6","#2dd4bf","#fbbf24","#38bdf8",
                  "#fb7185","#34d399","#a78bfa","#f97316","#ec4899"];
  let colorIdx = 0;
  function nextColor() {
    // Step by a non-1 stride so neighbours never share a colour.
    colorIdx = (colorIdx + 3) % COLORS.length;
    return COLORS[colorIdx];
  }

  const MAX_LETTERS = 60; // keep the DOM light; drop the oldest beyond this

  /* ---------- Sound state (persisted) ---------- */
  let soundOn = true;
  try {
    const saved = localStorage.getItem("hayden-sound");
    if (saved !== null) soundOn = saved === "on";
  } catch (e) {}
  function paintSoundBtn() {
    soundBtn.textContent = soundOn ? "🔊 Sound on" : "🔇 Sound off";
    soundBtn.setAttribute("aria-pressed", String(soundOn));
  }
  paintSoundBtn();

  soundBtn.addEventListener("click", function () {
    soundOn = !soundOn;
    try { localStorage.setItem("hayden-sound", soundOn ? "on" : "off"); } catch (e) {}
    paintSoundBtn();
    if (soundOn) { ensureAudio(); playPop(); }   // confirm it works
    else { stopSpeaking(); }
    refocus();
  });

  /* ---------- Web Audio "pop" ---------- */
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function playPop() {
    if (!soundOn || !audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = "sine";
    o.frequency.setValueAtTime(420, t);
    o.frequency.exponentialRampToValueAtTime(720, t + 0.08);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.30, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    o.start(t);
    o.stop(t + 0.2);
  }

  /* ---------- Web Speech ---------- */
  function stopSpeaking() {
    if ("speechSynthesis" in window) { try { window.speechSynthesis.cancel(); } catch (e) {} }
  }
  function speak(text) {
    if (!soundOn || !text || !("speechSynthesis" in window)) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9; u.pitch = 1.2; u.volume = 1;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  /* ---------- Rendering letters ---------- */
  function addLetterEl(text, isSpace) {
    const span = document.createElement("span");
    span.className = "letter" + (isSpace ? " space" : "");
    span.textContent = isSpace ? "" : text;
    span.style.color = nextColor();
    lettersEl.appendChild(span);
    while (lettersEl.children.length > MAX_LETTERS) {
      lettersEl.removeChild(lettersEl.firstChild);
    }
    stageEl.classList.remove("empty");
  }

  function handleChar(ch) {
    const display = ch.toUpperCase();
    addLetterEl(display, false);
    ensureAudio(); playPop();
    speak(display);  // speechSynthesis reads the letter/number aloud
  }
  function handleSpecial(kind) {
    if (kind === "space") {
      addLetterEl("", true);
      ensureAudio(); playPop();
    } else if (kind === "enter") {
      addLetterEl("✨", false);
      ensureAudio(); playPop();
    }
  }

  function clearLetters() {
    lettersEl.innerHTML = "";
    stageEl.classList.add("empty");
    stopSpeaking();
    refocus();
  }
  document.getElementById("typing-clear").addEventListener("click", clearLetters);

  /* ---------- Input capture ---------- */
  function isTypingActive() { return body.dataset.view === "typing"; }
  function refocus() { if (isTypingActive()) capture.focus(); }

  // Physical keyboard: listen on window so it works no matter what is focused.
  window.addEventListener("keydown", function (e) {
    if (!isTypingActive()) return;
    // Let Tab-focused buttons (Home/Clear/Sound) behave normally.
    if (e.target && e.target.tagName === "BUTTON") return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    const k = e.key;
    if (k === "Unidentified") return;          // mobile -> handled by 'input' event
    if (k === "Escape")    { e.preventDefault(); goHome(); return; }
    if (k === "Enter")     { e.preventDefault(); handleSpecial("enter"); return; }
    if (k === " " || k === "Spacebar") { e.preventDefault(); handleSpecial("space"); return; }
    if (k === "Backspace") { e.preventDefault(); return; }   // graceful: do nothing
    if (k === "Tab") return;                                  // keep Tab for navigation
    if (k.length === 1) { e.preventDefault(); handleChar(k); } // printable -> show it
    // everything else (arrows, Shift, F-keys...) is ignored
  });

  // On-screen keyboard (tablets): keydown often reports "Unidentified",
  // so read the typed character from the input itself, then reset it.
  capture.addEventListener("input", function () {
    const v = capture.value;
    capture.value = "";
    if (!v) return;
    const ch = v[v.length - 1];
    if (ch === " ") handleSpecial("space");
    else if (ch.length === 1) handleChar(ch);
  });

  // Keep the keyboard up: refocus when the play area is tapped.
  stageEl.addEventListener("pointerdown", function (e) {
    if (e.target === capture || e.target === stageEl || e.target === lettersEl) {
      setTimeout(refocus, 0);
    }
  });

  /* ============================================================
     DRAWING PAD
     The canvas bitmap persists while the view is hidden, so the
     drawing survives Home -> Drawing round-trips. Only Clear wipes it.
  ============================================================ */
  const pad      = document.getElementById("pad");
  const padCtx   = pad.getContext("2d");
  const drawStage = document.getElementById("draw-stage");

  const PAINT_COLORS = [
    // Row 1 — rainbow (her existing colours)
    ["Red", "#ef4444"], ["Orange", "#f97316"], ["Yellow", "#facc15"],
    ["Green", "#22c55e"], ["Blue", "#3b82f6"], ["Purple", "#8b5cf6"],
    ["Pink", "#ec4899"],
    // Row 2 — earth tones + extras
    ["Black", "#111111"], ["Brown", "#8b5e34"], ["Tan", "#d2b48c"],
    ["Gray", "#9ca3af"], ["Sky", "#38bdf8"], ["White", "#ffffff"],
    ["Magenta", "#d946ef"]
  ];
  const BRUSH_SIZES = [["Thin", 8], ["Medium", 20], ["Thick", 40]];
  const PAPER = "#ffffff";       // paper-white = the eraser colour

  let currentColor = "#111111"; // black pen by default
  let currentSize  = 20;        // medium-thick by default
  let padInited    = false;
  let eraserOn     = false;

  /* ---------- Undo stack (capped to limit tablet memory) ---------- */
  const undoStack = [];
  const UNDO_MAX  = 12;
  function pushUndo() {
    if (!padInited || !pad.width || !pad.height) return;
    const snap = document.createElement("canvas");
    snap.width = pad.width; snap.height = pad.height;
    snap.getContext("2d").drawImage(pad, 0, 0);
    undoStack.push(snap);
    if (undoStack.length > UNDO_MAX) undoStack.shift();   // drop the oldest
  }
  function undo() {
    const snap = undoStack.pop();
    if (!snap) return;
    padCtx.setTransform(1, 0, 0, 1, 0, 0);
    padCtx.clearRect(0, 0, pad.width, pad.height);
    padCtx.drawImage(snap, 0, 0);
    const ratio = window.devicePixelRatio || 1;
    padCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
  }

  /* ---------- Eraser mode (paints paper-white with the current brush) ---------- */
  const eraserBtn = document.getElementById("draw-eraser");
  function setEraser(on) {
    eraserOn = on;
    eraserBtn.setAttribute("aria-pressed", String(on));
    if (on) {
      // Deselect every colour so the eraser is the obvious active tool.
      document.querySelectorAll("#swatches .swatch")
        .forEach(function (s) { s.setAttribute("aria-pressed", "false"); });
    }
  }
  eraserBtn.addEventListener("click", function () { setEraser(true); });

  /* ---------- Build colour swatches ---------- */
  (function buildSwatches() {
    const wrap = document.getElementById("swatches");
    PAINT_COLORS.forEach(function (c) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "swatch";
      b.style.background = c[1];
      if (c[1].toLowerCase() === "#ffffff") b.classList.add("is-white");
      b.setAttribute("aria-label", c[0]);
      b.setAttribute("aria-pressed", String(c[1] === currentColor && !eraserOn));
      b.addEventListener("click", function () {
        currentColor = c[1];
        setEraser(false);   // picking a colour exits eraser mode
        wrap.querySelectorAll(".swatch").forEach(function (s) { s.setAttribute("aria-pressed", "false"); });
        b.setAttribute("aria-pressed", "true");
      });
      wrap.appendChild(b);
    });
  })();

  /* ---------- Build brush-size buttons ---------- */
  (function buildSizes() {
    const wrap = document.getElementById("sizes");
    BRUSH_SIZES.forEach(function (s) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "size-btn";
      b.setAttribute("aria-label", s[0] + " brush");
      b.setAttribute("aria-pressed", String(s[1] === currentSize));
      const dot = document.createElement("span");
      dot.className = "size-dot";
      const d = Math.min(s[1], 34);
      dot.style.width = d + "px";
      dot.style.height = d + "px";
      b.appendChild(dot);
      b.addEventListener("click", function () {
        currentSize = s[1];
        wrap.querySelectorAll(".size-btn").forEach(function (x) { x.setAttribute("aria-pressed", "false"); });
        b.setAttribute("aria-pressed", "true");
      });
      wrap.appendChild(b);
    });
  })();

  /* ---------- Canvas sizing (preserves the drawing on resize/rotate) ---------- */
  function sizeCanvas() {
    const w = pad.clientWidth, h = pad.clientHeight;
    if (!w || !h) return;                         // hidden view -> skip
    const ratio = window.devicePixelRatio || 1;
    const newW = Math.round(w * ratio), newH = Math.round(h * ratio);
    if (pad.width === newW && pad.height === newH) return;  // no real change

    let snap = null;
    if (padInited && pad.width && pad.height) {
      snap = document.createElement("canvas");
      snap.width = pad.width; snap.height = pad.height;
      snap.getContext("2d").drawImage(pad, 0, 0);
    }
    pad.width = newW; pad.height = newH;
    // White paper background, then restore any prior drawing (scaled to new size).
    padCtx.setTransform(1, 0, 0, 1, 0, 0);
    padCtx.fillStyle = "#ffffff";
    padCtx.fillRect(0, 0, pad.width, pad.height);
    if (snap) padCtx.drawImage(snap, 0, 0, snap.width, snap.height, 0, 0, pad.width, pad.height);
    padCtx.setTransform(ratio, 0, 0, ratio, 0, 0);  // draw in CSS pixels
    padInited = true;
    undoStack.length = 0;   // snapshots are size-specific; drop history on a real resize
  }

  /* ---------- Freehand drawing (pointer events: mouse + touch) ---------- */
  let drawing = false;
  let pts = [];
  function posOf(e) {
    const r = pad.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function strokeDot(p) {
    padCtx.beginPath();
    padCtx.fillStyle = eraserOn ? PAPER : currentColor;
    padCtx.arc(p.x, p.y, currentSize / 2, 0, Math.PI * 2);
    padCtx.fill();
  }
  pad.addEventListener("pointerdown", function (e) {
    drawing = true;
    pushUndo();                 // snapshot before this stroke (covers draw and erase)
    try { pad.setPointerCapture(e.pointerId); } catch (err) {}
    const p = posOf(e);
    pts = [p];
    strokeDot(p);            // a single tap leaves a dot
    e.preventDefault();
  });
  pad.addEventListener("pointermove", function (e) {
    if (!drawing) return;
    const p = posOf(e);
    pts.push(p);
    padCtx.strokeStyle = eraserOn ? PAPER : currentColor;
    padCtx.lineWidth = currentSize;
    padCtx.lineCap = "round";
    padCtx.lineJoin = "round";
    if (pts.length >= 3) {
      // Smooth: quadratic curve through the midpoints of the last three points.
      const a = pts[pts.length - 3], b = pts[pts.length - 2], c = pts[pts.length - 1];
      const m1 = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
      const m2 = { x: (b.x + c.x) / 2, y: (b.y + c.y) / 2 };
      padCtx.beginPath();
      padCtx.moveTo(m1.x, m1.y);
      padCtx.quadraticCurveTo(b.x, b.y, m2.x, m2.y);
      padCtx.stroke();
    } else {
      const a = pts[pts.length - 2], b = pts[pts.length - 1];
      padCtx.beginPath();
      padCtx.moveTo(a.x, a.y);
      padCtx.lineTo(b.x, b.y);
      padCtx.stroke();
    }
    e.preventDefault();
  });
  function endStroke(e) {
    if (!drawing) return;
    drawing = false;
    pts = [];
    if (e) e.preventDefault();
  }
  pad.addEventListener("pointerup", endStroke);
  pad.addEventListener("pointercancel", endStroke);
  pad.addEventListener("pointerleave", endStroke);

  /* ---------- Clear / Save ---------- */
  function clearPad() {
    pushUndo();                 // so Clear can be undone
    padCtx.setTransform(1, 0, 0, 1, 0, 0);
    padCtx.fillStyle = "#ffffff";
    padCtx.fillRect(0, 0, pad.width, pad.height);
    const ratio = window.devicePixelRatio || 1;
    padCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
  }
  function saveDrawing() {
    let url;
    try { url = pad.toDataURL("image/png"); } catch (err) { return; }
    // Unique local-time filename so saves never overwrite each other.
    const d = new Date();
    const p = function (n, w) { return String(n).padStart(w || 2, "0"); };
    const stamp = d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) +
      "_" + p(d.getHours()) + "-" + p(d.getMinutes()) + "-" + p(d.getSeconds()) +
      "-" + p(d.getMilliseconds(), 3);   // ms suffix guarantees uniqueness within a second
    const filename = "hayden-drawing-" + stamp + ".png";
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    // Also store the drawing in the in-app gallery (download behaviour unchanged).
    if (pad.toBlob) {
      pad.toBlob(function (blob) {
        if (blob) artAdd(blob, filename, d.getTime()).catch(function () {});
      }, "image/png");
    }
  }

  /* ---------- View wiring ---------- */
  function goDrawing() {
    body.dataset.view = "drawing";
    // Size after layout so clientWidth/Height are correct (and content is preserved).
    requestAnimationFrame(sizeCanvas);
  }
  document.getElementById("open-drawing").addEventListener("click", goDrawing);
  document.getElementById("draw-home").addEventListener("click", goHome);
  document.getElementById("draw-clear").addEventListener("click", clearPad);
  document.getElementById("draw-save").addEventListener("click", saveDrawing);
  document.getElementById("draw-undo").addEventListener("click", undo);

  // Resize/rotate: only when the drawing view is active (avoids zero-size while hidden).
  window.addEventListener("resize", function () {
    if (body.dataset.view === "drawing") sizeCanvas();
  });

  /* ============================================================
     GALLERY — saved drawings stored in IndexedDB
  ============================================================ */
  const ART_DB = "hayden-art", ART_STORE = "drawings";
  function artOpen() {
    return new Promise(function (resolve, reject) {
      let req;
      try { req = indexedDB.open(ART_DB, 1); } catch (e) { reject(e); return; }
      req.onupgradeneeded = function () {
        const db = req.result;
        if (!db.objectStoreNames.contains(ART_STORE)) {
          db.createObjectStore(ART_STORE, { keyPath: "id", autoIncrement: true });
        }
      };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }
  function artAdd(blob, name, ts) {
    return artOpen().then(function (db) {
      return new Promise(function (resolve, reject) {
        const tx = db.transaction(ART_STORE, "readwrite");
        tx.objectStore(ART_STORE).add({ blob: blob, name: name, ts: ts });
        tx.oncomplete = function () { db.close(); resolve(); };
        tx.onerror = function () { db.close(); reject(tx.error); };
      });
    });
  }
  function artGetAll() {
    return artOpen().then(function (db) {
      return new Promise(function (resolve, reject) {
        const tx = db.transaction(ART_STORE, "readonly");
        const r = tx.objectStore(ART_STORE).getAll();
        r.onsuccess = function () { db.close(); resolve(r.result || []); };
        r.onerror = function () { db.close(); reject(r.error); };
      });
    });
  }

  const galleryEl = document.getElementById("gallery");
  let galleryURLs = [];
  function clearGalleryURLs() {
    galleryURLs.forEach(function (u) { URL.revokeObjectURL(u); });
    galleryURLs = [];
  }
  function renderGallery() {
    const grid  = document.getElementById("gallery-grid");
    const empty = document.getElementById("gallery-empty");
    clearGalleryURLs();
    grid.innerHTML = "";
    artGetAll().then(function (items) {
      items.sort(function (a, b) { return (b.ts || 0) - (a.ts || 0); });  // newest first
      if (!items.length) { empty.hidden = false; grid.style.display = "none"; return; }
      empty.hidden = true; grid.style.display = "";
      items.forEach(function (it) {
        const objUrl = URL.createObjectURL(it.blob);
        galleryURLs.push(objUrl);
        const b = document.createElement("button");
        b.type = "button";
        b.className = "art-tile";
        b.setAttribute("aria-label", "View drawing");
        const img = document.createElement("img");
        img.src = objUrl; img.alt = "Drawing";
        b.appendChild(img);
        b.addEventListener("click", function () { openViewer(objUrl); });
        grid.appendChild(b);
      });
    }).catch(function () { empty.hidden = false; grid.style.display = "none"; });
  }

  function openViewer(objUrl) {
    document.getElementById("art-viewer-img").src = objUrl;
    galleryEl.classList.add("viewing");
  }
  function closeViewer() {
    galleryEl.classList.remove("viewing");
    document.getElementById("art-viewer-img").src = "";
  }

  function goGallery() {
    body.dataset.view = "gallery";
    closeViewer();
    renderGallery();
  }
  document.getElementById("open-gallery").addEventListener("click", goGallery);
  document.getElementById("draw-gallery").addEventListener("click", goGallery);
  document.getElementById("gallery-home").addEventListener("click", function () { closeViewer(); goHome(); });
  document.getElementById("viewer-back").addEventListener("click", closeViewer);
  document.getElementById("viewer-home").addEventListener("click", function () { closeViewer(); goHome(); });
  document.getElementById("gallery-empty-draw").addEventListener("click", goDrawing);

  /* ============================================================
     ANIMAL FRIENDS — grid, card, read-aloud with word highlight
  ============================================================ */
  const cardTextEl = document.getElementById("animal-card-text");
  let currentAnimal = 0;
  let animalSeq = 0;   // bumped to invalidate any in-flight read-aloud

  function clearHighlights() {
    cardTextEl.querySelectorAll(".aw.speaking").forEach(function (s) { s.classList.remove("speaking"); });
  }
  function stopAnimalRead() {
    animalSeq++;
    stopSpeaking();
    clearHighlights();
  }

  /* Build the grid once */
  function renderAnimalsGrid() {
    const grid = document.getElementById("animals-grid");
    if (grid.dataset.built) return;
    ANIMALS.forEach(function (a, idx) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "animal-tile";
      b.setAttribute("aria-label", a.name);
      const art = document.createElement("div");
      art.className = "animal-tile-art";
      const img = document.createElement("img");
      img.src = "animals/" + a.img; img.alt = a.name; img.loading = "lazy";
      art.appendChild(img);
      const label = document.createElement("div");
      label.className = "animal-tile-label";
      label.textContent = a.name;
      b.appendChild(art); b.appendChild(label);
      b.addEventListener("click", function () { goAnimalCard(idx); });
      grid.appendChild(b);
    });
    grid.dataset.built = "1";
  }

  /* Split text into <span class="aw"> word spans (display keeps punctuation) */
  function fillCardWords(el, text) {
    el.innerHTML = "";
    text.split(/\s+/).forEach(function (w, i) {
      if (i) el.appendChild(document.createTextNode(" "));
      const s = document.createElement("span");
      s.className = "aw";
      s.textContent = w;
      el.appendChild(s);
    });
  }

  /* Read the card aloud ONE WORD AT A TIME, highlighting each as it is spoken.
     Advances on utterance.onend (not onboundary, which is unreliable on mobile),
     with a safety timeout so it can never get stuck. Reuses the typing voice. */
  function readCard() {
    stopSpeaking();
    animalSeq++;
    const myId = animalSeq;
    clearHighlights();
    if (!soundOn || !("speechSynthesis" in window)) return;   // respect global mute
    const tokens = Array.prototype.slice.call(cardTextEl.querySelectorAll(".aw"));
    let i = 0;
    function step() {
      if (myId !== animalSeq) return;            // a newer read (or navigation) superseded us
      clearHighlights();
      if (i >= tokens.length) return;            // done
      const el = tokens[i];
      el.classList.add("speaking");
      try { el.scrollIntoView({ block: "center", behavior: "smooth" }); } catch (e) {}   // keep highlight in view as longer text reads
      const word = (el.textContent || "").replace(/[^A-Za-z0-9']/g, " ").trim();
      function advance() { if (myId !== animalSeq) return; i++; step(); }
      if (!word) { setTimeout(advance, 140); return; }   // punctuation-only token
      try {
        const u = new SpeechSynthesisUtterance(word);
        u.rate = 0.9; u.pitch = 1.2; u.volume = 1;        // same voice as the typing box
        let done = false;
        const go = function () { if (done) return; done = true; clearTimeout(safety); advance(); };
        const safety = setTimeout(go, 1900);              // never get stuck if onend misfires
        u.onend = go;
        u.onerror = go;
        window.speechSynthesis.speak(u);
      } catch (e) { setTimeout(advance, 140); }
    }
    step();
  }

  function goAnimalCard(idx) {
    stopAnimalRead();
    currentAnimal = (idx % ANIMALS.length + ANIMALS.length) % ANIMALS.length;   // loop
    const a = ANIMALS[currentAnimal];
    const img = document.getElementById("animal-card-img");
    img.src = "animals/" + a.img; img.alt = a.name;
    fillCardWords(document.getElementById("ac-name"), a.name);
    fillCardWords(document.getElementById("ac-fact"), a.facts.join(" "));
    fillCardWords(document.getElementById("ac-sound"), a.sound);
    document.getElementById("animal-card-body").scrollTop = 0;
    body.dataset.view = "card";
    setTimeout(readCard, 350);   // auto-read after layout settles
  }

  function goAnimals() { stopAnimalRead(); renderAnimalsGrid(); body.dataset.view = "animals"; }

  document.getElementById("open-animals").addEventListener("click", goAnimals);
  document.getElementById("animals-home").addEventListener("click", function () { stopAnimalRead(); goHome(); });
  document.getElementById("card-home").addEventListener("click", function () { stopAnimalRead(); goHome(); });
  document.getElementById("card-prev").addEventListener("click", function () { goAnimalCard(currentAnimal - 1); });
  document.getElementById("card-next").addEventListener("click", function () { goAnimalCard(currentAnimal + 1); });
  document.getElementById("card-read").addEventListener("click", readCard);

  /* ---------- PWA: register the service worker ---------- */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
</body>
</html>
